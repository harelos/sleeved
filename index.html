<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F5EBDA">
<title>Sleeved — Cash-envelope budgeting</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5EBDA;--card:#FFFFFF;--line:#E3D2B8;--ink:#2B2015;--mut:#7A6650;--dim:#A88F76;--acc:#B5542A;--warn:#8A5A35;--over:#C25E4C}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;min-height:100dvh}
.wrap{max-width:440px;margin:0 auto;padding:24px 20px 44px}
.mono{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}
.eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
h1{font-size:27px;font-weight:700;letter-spacing:-.02em;line-height:1.08}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 4px -2px rgba(28,38,32,.07)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{transform:scale(.985)}
.btn-acc{background:var(--acc);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--mut);font-size:13px;padding:11px}
input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px;color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none}
input:focus{border-color:var(--acc)}
label{display:block;font-size:12px;color:var(--mut);margin:13px 0 6px;font-weight:500}
.env{padding:14px 0;border-bottom:1px solid var(--line)}
.env:last-child{border:none}
.ebar{height:8px;background:var(--bg);border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-top:8px}
.efill{height:100%;background:var(--acc);border-radius:5px;transition:width .3s ease-out}
@media (prefers-reduced-motion:reduce){.efill{transition:none}}
.spend{background:var(--bg);border:1px solid var(--line);color:var(--acc);padding:8px 13px;border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;font-weight:700}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;font-family:'Space Mono',monospace;font-size:12px;z-index:200}
.hidden{display:none!important}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat b{font-family:'Space Mono',monospace;font-size:19px;display:block;color:var(--acc)}
.stat span{font-size:9px;letter-spacing:.13em;color:var(--dim);text-transform:uppercase;font-family:'Space Mono',monospace}
</style>
<link rel="manifest" href="manifest.json">
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js")</script>
</head>
<body>
<div class="wrap">

<div style="display:flex;justify-content:space-between;align-items:baseline">
  <div class="eyebrow">ENVELOPES</div>
  <button onclick="newMonth()" style="background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;font-family:'Space Mono',monospace">NEW MONTH</button>
</div>
<h1 style="margin:8px 0 6px">Cash stuffing,<br><span style="color:var(--acc)">without the cash.</span></h1>
<p style="color:var(--mut);font-size:13.5px;line-height:1.55;margin-bottom:14px">Grandma's system, because it works: money split into envelopes, and when an envelope is empty, you stop. Watch each one drain as the month goes.</p>

<div class="row2" style="margin-top:0">
  <div class="stat"><b id="st-left">$0</b><span>left this month</span></div>
  <div class="stat"><b id="st-budget" style="color:var(--ink)">$0</b><span>total budget</span></div>
</div>

<div class="card hidden" style="margin-top:12px" id="envcard">
  <div class="eyebrow" style="color:var(--dim);margin-bottom:2px">YOUR ENVELOPES · <span id="monthname"></span></div>
  <div id="envs"></div>
</div>

<div style="height:10px"></div>
<button class="btn btn-ghost" onclick="toggleAdd()">+ New envelope</button>

<div class="card hidden" id="addform" style="margin-top:10px">
  <label>Envelope name</label>
  <input id="e-name" placeholder="Groceries, Fun, Eating out, Gas...">
  <label>Monthly budget ($)</label>
  <input id="e-amt" type="number" inputmode="decimal" placeholder="400">
  <div style="height:14px"></div>
  <button class="btn btn-acc" onclick="addEnv()">Stuff the envelope</button>
</div>

</div>
<script>
const store={m:{},get(k,d){try{const v=localStorage.getItem('ev_'+k);return v!==null?JSON.parse(v):d}catch(e){return k in this.m?this.m[k]:d}},set(k,v){try{localStorage.setItem('ev_'+k,JSON.stringify(v))}catch(e){this.m[k]=v}}};
let envs=store.get('envs',[]),spendCount=store.get('spendCount',0);
function save(){store.set('envs',envs);store.set('spendCount',spendCount)}
function toggleAdd(){document.getElementById('addform').classList.toggle('hidden')}
function addEnv(){
  const n=document.getElementById('e-name').value.trim();
  const a=parseFloat(document.getElementById('e-amt').value);
  if(!n||!a){toast('NAME + BUDGET');return}
  envs.push({id:Date.now(),name:n,budget:a,spent:0});
  save();
  document.getElementById('e-name').value='';document.getElementById('e-amt').value='';
  document.getElementById('addform').classList.add('hidden');render();
}
function spend(id){
  const e=envs.find(x=>x.id===id);
  const a=parseFloat(prompt('Spent from '+e.name+' ($):'));
  if(!a||a<=0)return;
  e.spent+=a;spendCount++;save();render();
  const left=e.budget-e.spent;
  toast(left<0?e.name.toUpperCase()+' OVER BY $'+Math.abs(left).toFixed(0):'$'+left.toFixed(0)+' LEFT IN '+e.name.toUpperCase());
  if(spendCount%4===0&&typeof GK!=='undefined')GK.win();
}
function removeEnv(id){
  const e=envs.find(x=>x.id===id);
  if(!confirm('Delete "'+e.name+'"?'))return;
  envs=envs.filter(x=>x.id!==id);save();render();
}
function newMonth(){
  if(!envs.length)return;
  if(!confirm('Start a new month? Budgets stay, spending resets to zero.'))return;
  envs.forEach(e=>e.spent=0);save();render();toast('NEW MONTH · ENVELOPES RESTUFFED');
}
function render(){
  const totB=envs.reduce((a,e)=>a+e.budget,0);
  const totS=envs.reduce((a,e)=>a+e.spent,0);
  document.getElementById('st-budget').textContent='$'+totB.toFixed(0);
  document.getElementById('st-left').textContent='$'+Math.max(0,totB-totS).toFixed(0);
  document.getElementById('monthname').textContent=new Date().toLocaleDateString(undefined,{month:'long'}).toUpperCase();
  const ec=document.getElementById('envcard');
  ec.classList.toggle('hidden',envs.length===0);
  document.getElementById('envs').innerHTML=envs.map(e=>{
    const pct=Math.min(100,e.spent/e.budget*100);
    const left=e.budget-e.spent;
    const over=left<0;
    return `<div class="env">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div onclick="removeEnv(${e.id})"><b style="font-size:15px">${esc(e.name)}</b>
          <div class="mono" style="font-size:10.5px;color:${over?'var(--over)':'var(--dim)'}">${over?'OVER BY $'+Math.abs(left).toFixed(0):'$'+left.toFixed(0)+' OF $'+e.budget.toFixed(0)+' LEFT'}</div></div>
        <button class="spend" onclick="spend(${e.id})">− SPEND</button>
      </div>
      <div class="ebar"><div class="efill" style="width:${pct}%;background:${over?'var(--over)':pct>75?'var(--warn)':'var(--acc)'}"></div></div>
    </div>`;
  }).join('');
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
render();
</script>
<script>
const GK_CONFIG={app:'Sleeved',pkg:'com.tigerbrands.envelopes',accent:'#B5542A',bg:'#F5EBDA',ink:'#2B2015',
  onboard:[{h:'Grandma\'s system works',p:'Money split into envelopes. When an envelope is empty, you stop. Simple, brutal, effective.'},{h:'Stuff, spend, see',p:'Create envelopes with monthly budgets, log spending as it happens, watch each bar drain. New month, restuff.'}],askAfterWins:2};
const GK={
  s:{get(k,d){try{const v=localStorage.getItem('gk_'+GK_CONFIG.app+'_'+k);return v!==null?JSON.parse(v):d}catch(e){return d}},set(k,v){try{localStorage.setItem('gk_'+GK_CONFIG.app+'_'+k,JSON.stringify(v))}catch(e){}}},
  css(){const c=GK_CONFIG;const st=document.createElement('style');
    st.textContent=`.gk-ov{position:fixed;inset:0;background:${c.bg}F2;z-index:900;display:flex;align-items:center;justify-content:center;padding:26px;backdrop-filter:blur(4px)}
.gk-card{background:${c.bg};border:1px solid ${c.accent}66;border-radius:16px;padding:26px 22px;max-width:360px;width:100%;color:${c.ink};font-family:system-ui,sans-serif;box-shadow:0 20px 60px -20px rgba(0,0,0,.45)}
.gk-h{font-size:21px;font-weight:700;margin-bottom:8px;line-height:1.15}
.gk-p{font-size:14px;line-height:1.6;opacity:.75;margin-bottom:18px}
.gk-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;background:${c.accent};color:${c.bg};font-size:15px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif}
.gk-ghost{background:transparent;color:${c.ink};opacity:.55;border:none;width:100%;padding:12px;font-size:13px;cursor:pointer;font-family:system-ui,sans-serif}
.gk-dots{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.gk-dot{width:7px;height:7px;border-radius:50%;background:${c.ink};opacity:.25}
.gk-dot.on{background:${c.accent};opacity:1}
.gk-foot{text-align:center;padding:22px 0 6px;font-family:monospace;font-size:10.5px;letter-spacing:.08em}
.gk-foot a{color:${c.accent};text-decoration:none;opacity:.85}`;
    document.head.appendChild(st)},
  onboard(){if(GK.s.get('onboarded',false))return;
    let i=0;const ov=document.createElement('div');ov.className='gk-ov';
    const render=()=>{const step=GK_CONFIG.onboard[i];
      ov.innerHTML=`<div class="gk-card"><div class="gk-dots">${GK_CONFIG.onboard.map((_,j)=>`<div class="gk-dot ${j===i?'on':''}"></div>`).join('')}</div><div class="gk-h">${step.h}</div><div class="gk-p">${step.p}</div><button class="gk-btn" id="gk-next">${i<GK_CONFIG.onboard.length-1?'Next':"Let's go"}</button></div>`;
      ov.querySelector('#gk-next').onclick=()=>{i++;if(i>=GK_CONFIG.onboard.length){GK.s.set('onboarded',true);ov.remove()}else render()}};
    render();document.body.appendChild(ov)},
  win(){const wins=GK.s.get('wins',0)+1;GK.s.set('wins',wins);
    const state=GK.s.get('review','pending');
    if(state==='done'||state==='never')return;
    const threshold=state==='later'?GK.s.get('nextAsk',999):GK_CONFIG.askAfterWins;
    if(wins>=threshold)setTimeout(()=>GK.gate(wins),900)},
  gate(wins){const ov=document.createElement('div');ov.className='gk-ov';
    ov.innerHTML=`<div class="gk-card"><div class="gk-h">Is ${GK_CONFIG.app} actually helping you?</div><div class="gk-p">Honest answer — it decides what I build next.</div><button class="gk-btn" id="gk-yes">Yes, it's working</button><button class="gk-ghost" id="gk-no">Not really</button></div>`;
    document.body.appendChild(ov);
    ov.querySelector('#gk-yes').onclick=()=>{
      ov.querySelector('.gk-card').innerHTML=`<div class="gk-h">That's the goal 🤝</div><div class="gk-p">A 30-second review is what keeps a free, no-ads app alive on the Play Store. Would you leave one?</div><button class="gk-btn" id="gk-rate">Leave a review</button><button class="gk-ghost" id="gk-later">Maybe later</button>`;
      ov.querySelector('#gk-rate').onclick=()=>{GK.s.set('review','done');window.open('market://details?id='+GK_CONFIG.pkg);ov.remove()};
      ov.querySelector('#gk-later').onclick=()=>{const again=GK.s.get('review','pending')==='later';GK.s.set('review',again?'never':'later');GK.s.set('nextAsk',wins+10);ov.remove()}};
    ov.querySelector('#gk-no').onclick=()=>{GK.s.set('review','never');
      ov.querySelector('.gk-card').innerHTML=`<div class="gk-h">Tell me what's wrong.</div><div class="gk-p">I read every email and ship fixes fast. What's not working for you?</div><button class="gk-btn" id="gk-mail">Email the developer</button><button class="gk-ghost" id="gk-skip">Skip</button>`;
      ov.querySelector('#gk-mail').onclick=()=>{GK.feedback('Something is not working for me');ov.remove()};
      ov.querySelector('#gk-skip').onclick=()=>ov.remove()}},
  feedback(subject){location.href='mailto:support@tigerbrandsglobal.com?subject='+encodeURIComponent('['+GK_CONFIG.app+'] '+(subject||'Feedback'))+'&body='+encodeURIComponent('App: '+GK_CONFIG.app+'\n\n')},
  footer(){const f=document.createElement('div');f.className='gk-foot';
    f.innerHTML=`<a href="#" onclick="GK.feedback();return false">FEEDBACK & IDEAS → SUPPORT@TIGERBRANDSGLOBAL.COM</a>`;
    (document.querySelector('.wrap')||document.body).appendChild(f)},
  offer(){},
  init(){GK.css();GK.footer();GK.onboard()}
};
GK.init();
</script>
<script src="billing.js"></script>
</body>
</html>
